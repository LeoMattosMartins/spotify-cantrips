<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cantrips HUD</title>
    <style>
      :root {
        --bg: rgba(9, 14, 28, 0.3);
        --panel: rgba(6, 12, 24, 0.65);
        --line: rgba(130, 198, 255, 0.9);
        --accent: #35dca4;
        --text: #d8efff;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Avenir Next', 'Segoe UI', sans-serif;
        color: var(--text);
        background: #000;
      }
      .hud {
        width: 100%;
        height: 100%;
        position: relative;
      }
      #camera {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
        filter: saturate(1.05) contrast(1.05);
        z-index: 0;
      }
      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      .panel {
        position: absolute;
        top: 20px;
        right: 20px;
        background: var(--panel);
        border: 1px solid rgba(145, 201, 255, 0.4);
        border-radius: 16px;
        padding: 14px 16px;
        min-width: 230px;
        backdrop-filter: blur(10px);
        z-index: 2;
      }
      .label {
        font-size: 12px;
        opacity: 0.8;
      }
      .value {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .inactive {
        opacity: 0.45;
      }
    </style>
  </head>
  <body>
    <div class="hud" id="hud">
      <video id="camera" autoplay playsinline muted></video>
      <canvas id="skeleton"></canvas>
      <div class="panel" id="panel">
        <div class="label">Mode</div>
        <div class="value" id="mode">LOW-POWER LISTEN</div>
        <div class="label">Track</div>
        <div class="value" id="track">Unknown — Unknown</div>
      </div>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
